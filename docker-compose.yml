services:
  mysql:
    image: mysql:8.4
    container_name: smartgarden-mysql
    restart: unless-stopped
    env_file:
      - ./backend-api/.env
    ports:
      - "3306:3306"
    volumes:
      - smartgarden-mysql-data:/var/lib/mysql
      - ./backend-api/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  smartgarden-mysql-data:
